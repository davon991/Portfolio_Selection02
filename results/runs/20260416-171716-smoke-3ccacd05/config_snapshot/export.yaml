run:
  name: smoke
  results_dir: results/runs
  seed: 123
  code_commit: NA
data:
  source: yfinance
  csv_folder: data/raw
  tickers:
  - SPY
  - VEA
  - EEM
  - IEF
  - TLT
  - TIP
  - LQD
  - VNQ
  - GLD
  - DBC
  start: '2015-01-01'
  end: '2022-12-31'
experiment:
  rebalance: monthly_last
  window_L: 252
  covariance_method: ledoit_wolf_shrinkage
  x_max: 0.35
  cost_c: 0.0001
  eps_db: 1.0e-10
  annualization_factor: 252
solver:
  max_iter: 1200
  tol: 1.0e-10
  rho: 2000.0
calibration:
  train_frac: 0.6
  val_frac: 0.2
  test_frac: 0.2
  p_grid:
  - 0.4
  - 0.5
  - 0.6
  - 0.7
  - 0.8
  TO_target: 0.15
  eps_TO: 0.01
  alpha_grid:
  - 1.0e-06
  - 1.0e-05
  - 0.0001
  min_active_rate: 0.05
  max_active_rate: 0.9
  max_boundary_xmax_rate: 0.3
  max_boundary_zero_rate: 0.8
  max_turnover_ratio_p95_to_median: 5.0
  min_convergence_rate: 0.99
  max_failure_streak: 3
  score_lambda_cost: 0.0
  score_lambda_instability: 0.0
reporting:
  make_figures: true
  figure_format:
  - png
  - pdf
  selected_windows: 3
  make_tables: true
